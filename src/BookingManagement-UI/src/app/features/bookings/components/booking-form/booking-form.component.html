<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div *ngIf="errorMessage || formError" class="alert error">
    {{ errorMessage || formError }}
  </div>

  <div class="form-grid">
    <label>
      <span>Resource <em>*</em></span>
      <select formControlName="resourceId">
        <option value="">Select a resource</option>
        <option *ngFor="let resource of resources" [value]="resource.id">{{ resource.name }}</option>
      </select>
      <small *ngIf="showFieldError('resourceId')">Resource is required.</small>
    </label>

    <label>
      <span>Booked by <em>*</em></span>
      <select formControlName="userId">
        <option value="">Select a user</option>
        <option *ngFor="let user of users" [value]="user.id">{{ user.displayName }}</option>
      </select>
      <small *ngIf="showFieldError('userId')">User is required.</small>
    </label>

    <label>
      <span>Start date and time <em>*</em></span>
      <input type="datetime-local" formControlName="startDateTime">
      <small *ngIf="showFieldError('startDateTime')">Start date and time is required.</small>
    </label>

    <label>
      <span>End date and time <em>*</em></span>
      <input type="datetime-local" formControlName="endDateTime">
      <small *ngIf="showFieldError('endDateTime')">End date and time is required.</small>
    </label>
  </div>

  <p class="hint">Times entered here are converted to UTC before they are sent to the API.</p>

  <div class="actions">
    <button class="secondary" type="button" (click)="reset()" [disabled]="isSubmitting">Clear</button>
    <button class="primary" type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Creating booking…' : 'Create booking' }}
    </button>
  </div>
</form>
